<?xml version="1.0" encoding="UTF-8"?>
<!--
  DeChellis Capital - horizontal lockup (dark variant, for navy/dark headers/footers).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" role="img"
     aria-labelledby="dc-h-title-d">
  <title id="dc-h-title-d">DeChellis Capital</title>

  <defs>
    <linearGradient id="hd-mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e8ecf5"/>
      <stop offset="100%" stop-color="#c4ccdf"/>
    </linearGradient>
    <linearGradient id="hd-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <path id="hd-left"
          d="M 27 27 L 56 34 L 56 61 L 88 70 L 88 41 L 117 49 L 117 209 L 27 120 Z"/>
    <path id="hd-right"
          d="M 231 27 L 202 34 L 202 61 L 170 70 L 170 41 L 142 49 L 142 209 L 231 120 Z"/>
  </defs>

  <g transform="translate(0 10) scale(0.43)">
    <use href="#hd-left"  fill="url(#hd-mark)"/>
    <use href="#hd-right" fill="url(#hd-mark)"/>
    <use href="#hd-left"  fill="url(#hd-sheen)"/>
    <use href="#hd-right" fill="url(#hd-sheen)"/>
  </g>

  <g fill="#ffffff" font-family="'Montserrat', 'Jost', system-ui, sans-serif">
    <text x="130" y="66" font-size="50" font-weight="300" letter-spacing="1.5">DeChellis</text>
    <text x="132" y="96" font-size="15" font-weight="400" letter-spacing="9">CAPITAL</text>
  </g>
</svg>
