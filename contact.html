<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — DeChellis Capital</title>
  <meta name="description" content="Get in touch with DeChellis Capital. 916 Turtle Cove Lane, Suite 200, Vero Beach, FL. (772) 410-8382." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contact — DeChellis Capital" />
  <meta property="og:description" content="Get in touch with DeChellis Capital. 916 Turtle Cove Lane, Suite 200, Vero Beach, FL. (772) 410-8382." />
  <meta property="og:url" content="https://ravescovi.github.io/dcc_web/contact.html" />
  <meta property="og:image" content="https://ravescovi.github.io/dcc_web/assets/logo/favicon-192.png" />
  <meta property="og:site_name" content="DeChellis Capital" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Contact — DeChellis Capital" />
  <meta name="twitter:description" content="Get in touch with DeChellis Capital. 916 Turtle Cove Lane, Suite 200, Vero Beach, FL. (772) 410-8382." />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="assets/logo/dechellis-capital-mark.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/logo/favicon-192.png" />
  <link rel="apple-touch-icon" href="assets/logo/favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>document.documentElement.className = document.documentElement.className.replace('no-js','js');</script>
</head>
<body>
  <site-header data-current="contact"></site-header>

  <main id="main" tabindex="-1">
    <section class="hero hero--compact">
      <div class="container">
        <div class="hero__inner">
          <span class="eyebrow">Get in touch</span>
          <h1>Contact us</h1>
        </div>
      </div>
    </section>

    <section class="contact-section">
      <div class="container">
        <div class="contact-layout">
          <!-- Left column: details + map -->
          <div class="contact-info">
            <dl class="contact-info__list">
              <div>
                <dt>Address</dt>
                <dd>916 Turtle Cove Lane &mdash; Suite 200<br />Vero Beach, Florida 32963</dd>
              </div>
              <div>
                <dt>Hours</dt>
                <dd>Mon &ndash; Fri: 9:00 am &ndash; 5:00 pm<br />Sat &ndash; Sun: by appointment</dd>
              </div>
              <div>
                <dt>Phone</dt>
                <dd><a href="tel:+17724108382">(772) 410-8382</a></dd>
              </div>
              <div>
                <dt>Email</dt>
                <dd><a href="mailto:contact@dechelliscapital.com">contact@dechelliscapital.com</a></dd>
              </div>
            </dl>

            <div class="contact-map">
              <iframe
                title="Map of 916 Turtle Cove Lane, Vero Beach, FL"
                src="https://www.google.com/maps?q=916+Turtle+Cove+Lane,+Vero+Beach,+FL+32963&z=15&output=embed"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                allowfullscreen></iframe>
            </div>
          </div>

          <!-- Right column: form -->
          <div class="contact-form-wrap">
            <h2 class="contact-form-wrap__title">Send us a message</h2>
            <p class="contact-form-wrap__lede">We&rsquo;ll get back to you as soon as possible.</p>
            <form class="contact-form" action="mailto:contact@dechelliscapital.com" method="post" enctype="text/plain" novalidate>
              <div class="contact-form__row">
                <div>
                  <label for="name">Name</label>
                  <input type="text" id="name" name="name" required autocomplete="name" />
                </div>
                <div>
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" required autocomplete="email" />
                </div>
              </div>
              <div>
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" autocomplete="tel" />
              </div>
              <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
              </div>
              <div class="contact-form__actions">
                <button type="submit" class="btn">Send Message</button>
              </div>
              <div class="form-status" role="status" aria-live="polite"></div>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <site-footer></site-footer>

  <script src="components.js" defer></script>
  <script type="module" src="motion.js"></script>
</body>
</html>
